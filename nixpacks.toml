[providers]
node = "22"
python = "3.11"

[phases.setup]
nixPkgs = ["...", "python3", "python3-pip"]

[phases.install]
cmds = [
    "npm install",
    "python3 -m venv /opt/venv",
    ". /opt/venv/bin/activate && pip install -r backend/requirements.txt && pip install asyncpg"
]

[phases.build]
cmds = ["npm run build"]
