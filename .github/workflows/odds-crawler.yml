name: Mosport Odds Crawler (4x Daily)

on:
  schedule:
    - cron: '0 2,6,10,18 * * *'
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Odds Crawler
        run: |
          curl -X POST "https://www.mosport.app/api/admin/engine" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"task": "oddsCrawler"}'
