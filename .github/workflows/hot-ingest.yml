name: Hot Data Ingestion

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ingest-hot:
    runs-on: ubuntu-latest
    env:
      INGEST_URL: "https://www.mosport.app/api/admin/ingest/hot"
      INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
    steps:
      - name: Trigger Mosport ingestion
        run: |
          if [ -z "${INGEST_URL}" ]; then
            echo "::error::INGEST_URL is missing. Set it in GitHub Actions secrets or variables."
            exit 1
          fi

          if [ -z "${INGEST_SECRET}" ]; then
            echo "::error::INGEST_SECRET is missing. Set it in GitHub Actions secrets."
            exit 1
          fi

          curl -X POST "${INGEST_URL}" \
            -H "x-ingest-secret: ${INGEST_SECRET}" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            --show-error
