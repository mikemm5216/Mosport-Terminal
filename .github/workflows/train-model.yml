name: Train Experience Model

on:
  schedule:
    - cron: "0 3 * * *"   # 每天凌晨 3 點執行
  workflow_dispatch:      # 支援手動觸發

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install pandas numpy xgboost psycopg2-binary
        
      - name: Run training script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/train.py
        
      # 未來可在此加入步驟：將生成的 model.json 上傳至 Cloudflare R2
