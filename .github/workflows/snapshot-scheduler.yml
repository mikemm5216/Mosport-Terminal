name: Snapshot Scheduler

on:
  schedule:
    - cron: "*/15 * * * *"   # 每 15 分鐘運行一次
  workflow_dispatch:         # 支援從 Actions 頁籤手動觸發測試

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Call Snapshot Scheduler API
        run: |
          curl -L -X POST "https://mosport-terminal-git-main-michael-mos-projects.vercel.app/api/scheduler/run?x-vercel-protection-bypass=${{ secrets.VERCEL_BYPASS_TOKEN }}&x-vercel-set-bypass-cookie=true" \
            -H "Content-Type: application/json" \
            -d '{"secret": "${{ secrets.CRON_SECRET }}"}'
