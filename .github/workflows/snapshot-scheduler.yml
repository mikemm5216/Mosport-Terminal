name: Snapshot Scheduler

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Mosport Scheduler
        run: |
          curl -L -X POST "https://mosport-terminal.vercel.app/api/scheduler/run" \
            -H "Content-Type: application/json" \
            -d "{\"secret\": \"${{ secrets.CRON_SECRET }}\"}"
