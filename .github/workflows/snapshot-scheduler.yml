name: Snapshot Scheduler

on:
  schedule:
    - cron: "*/15 * * * *"   # 每 15 分鐘運行一次
  workflow_dispatch:         # 支援手動觸發測試

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Call Snapshot Scheduler API
        run: |
          curl -X POST https://mosport-terminal.vercel.app/api/scheduler/run \
            -H "Content-Type: application/json" \
            -d '{"secret": "${{ secrets.CRON_SECRET }}"}'
