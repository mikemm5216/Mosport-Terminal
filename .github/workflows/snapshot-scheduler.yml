name: Snapshot Scheduler

on:
  schedule:
    - cron: "*/15 * * * *"   # 每 15 分鐘
  workflow_dispatch:         # 支援從 Actions 頁籤手動觸發測試

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Call Snapshot Scheduler API
        run: |
          curl -X POST https://www.mosport.app/api/scheduler/run \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
