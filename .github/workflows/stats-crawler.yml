name: Mosport Stats Crawler (2x Daily)

on:
  schedule:
    - cron: '30 4,14 * * *'
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Stats Crawler
        run: |
          curl -X POST "https://www.mosport.app/api/admin/engine" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"task": "statsCrawler"}'
